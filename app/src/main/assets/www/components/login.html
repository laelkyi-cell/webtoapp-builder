<div class="screen active">
    <div style="padding: 40px 20px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <i class="fas fa-id-card" style="font-size: 64px; color: #3b82f6;"></i>
            <h1 style="font-size: 28px; margin-top: 16px;">Welcome Back</h1>
            <p style="color: #64748b;">Sign in to continue</p>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="#/register" style="color: #3b82f6; text-decoration: none;">Create an account</a>
        </div>
    </div>
</div>
