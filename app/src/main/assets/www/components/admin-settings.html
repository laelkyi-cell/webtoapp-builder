<div class="screen active">
    <!-- Header -->
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1>সেটিংস</h1>
        <div style="width: 40px;"></div>
    </div>
    
    <div style="padding: 16px;">
        <form id="settings-form">
            <div class="form-group">
                <label>নোটিশ</label>
                <textarea id="notice" rows="3" placeholder="নোটিশ টেক্সট লিখুন"></textarea>
            </div>
            
            <div class="form-group">
                <label>WhatsApp লিংক</label>
                <input type="url" id="whatsapp" placeholder="https://wa.me/...">
            </div>
            
            <div class="form-group">
                <label>Telegram লিংক</label>
                <input type="url" id="telegram" placeholder="https://t.me/...">
            </div>
            
            <div class="form-group">
                <label>Facebook লিংক</label>
                <input type="url" id="facebook" placeholder="https://facebook.com/...">
            </div>
            
            <button type="submit" class="btn btn-primary">সেভ করুন</button>
        </form>
    </div>
</div>
