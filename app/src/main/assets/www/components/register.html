<div class="screen active">
    <div style="padding: 20px;">
        <button class="back-btn" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        
        <div style="text-align: center; margin: 20px 0 30px;">
            <i class="fas fa-user-plus" style="font-size: 48px; color: #3b82f6;"></i>
            <h1 style="font-size: 24px; margin-top: 16px;">Create Account</h1>
        </div>
        
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Choose a password" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="#/login" style="color: #3b82f6; text-decoration: none;">Already have an account?</a>
        </div>
    </div>
</div>
