name: Unzip Gradle Files

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Extract gradle.zip
        run: |
          if [ -f "gradle.zip" ]; then
            unzip -o gradle.zip
            rm gradle.zip
          fi
      
      - name: Commit extracted files
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-unzip gradle files"
          git push
